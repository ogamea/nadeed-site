<?xml version="1.0" encoding="UTF-8"?>
<!--
  NADEED — نضيد | LOGO SYSTEM
  ════════════════════════════════════════════════════════════
  MASTER SPECIFICATION — All variants derived from this file.
  Do NOT draw logo variants independently.

  ── CANONICAL MARK MATHEMATICS ───────────────────────────
  Unit grid: 1 unit = 1px at 1× (nav size)

  ARTBOARD (nav): 40 × 46 px
  CENTER POINT:   cx=20, cy=20
  CLEAR SPACE:    2 units on all sides of outer ring

  OUTER RING
    radius:         r = 18
    stroke-width:   0.7
    stroke:         #EDE4D3
    fill:           none

  CARDINAL TICKS (4 only — N·E·S·W)
    North:  (20, 2) → (20, 5)     length=3
    East:   (38,20) → (35,20)     length=3
    South:  (20,38) → (20,35)     length=3
    West:   ( 2,20) → ( 5,20)     length=3
    stroke-width: 0.8
    stroke-linecap: round

  NUN ARC (open semicircle — the letter body)
    Path: M 9,20  A 11,11  0 0,1  31,20
    → center=(20,20), r=11, sweep-flag=1 (clockwise top half)
    → start=(9,20) = cx−r, end=(31,20) = cx+r
    → forms exact upper semicircle of r=11 centered on (20,20)
    stroke-width: 2.4
    stroke-linecap: round
    fill: none

  NUN STEM (descender)
    from: (9,20)  to: (9,30)
    → x = cx − arc_r = 20 − 11 = 9
    → height = 10 (from arc baseline to serif baseline)
    stroke-width: 2.4
    stroke-linecap: round

  SERIF FOOT (horizontal base)
    from: (4.5,30)  to: (13.5,30)
    → center x=9, half-width=4.5
    → y=30 (bottom of stem)
    stroke-width: 1.5
    stroke-linecap: round

  NUQTA (the soul — press crimson dot)
    cx = 20  (horizontal center of arc = artboard center)
    cy = 34  (30 + 4 = serif baseline + 4 units below)
    r  = 2.4
    fill: #9B1C1C
    → offset from stem baseline: +4 units
    → offset from artboard center (cy=20): +14 units

  SCALING RULES
    All coordinates scale linearly from the nav mark.
    Scale factor S = target_width / 40
    New cx = 20×S,  cy_center = 20×S
    All r, stroke-width, tick positions, nuqta cy, foot positions → ×S

  ── SCALE TABLE ──────────────────────────────────────────
  Variant         Width  Scale   nuqta cy   arc r  stem bottom
  nav / micro      40     1.0×     34        11       30
  primary mark    120     3.0×    102        33       90
  ceremonial      240     6.0×    204        66      180

  ── MINIMUM SIZE ─────────────────────────────────────────
  Minimum render width: 24px (nav mark only at this size)
  Below 24px: use wordmark "نضيد" only, no mark

  ── PIXEL SNAPPING ───────────────────────────────────────
  All coordinates at nav size are on or half-pixel grid.
  At larger sizes coordinates remain on integer or .5 grid.
  ════════════════════════════════════════════════════════════
-->

<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="display:none" aria-hidden="true">
<defs>

  <!-- ══ SYMBOL 1: nav — 40×46 viewBox, S=1× ══ -->
  <symbol id="nadeed-mark-nav" viewBox="0 0 40 46">
    <title>نضيد | NADEED</title>
    <!-- Outer ring -->
    <circle cx="20" cy="20" r="18"
            fill="none" stroke="#EDE4D3" stroke-width="0.7"/>
    <!-- Cardinals: N·E·S·W only -->
    <line x1="20" y1="2"  x2="20" y2="5"  stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="38" y1="20" x2="35" y2="20" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="20" y1="38" x2="20" y2="35" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="2"  y1="20" x2="5"  y2="20" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Nun arc: M(cx−r,cy) A r,r 0 0,1 (cx+r,cy)  r=11 -->
    <path d="M 9,20 A 11,11 0 0,1 31,20"
          fill="none" stroke="#EDE4D3" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Stem: x=9, from y=20 to y=30 -->
    <line x1="9" y1="20" x2="9" y2="30"
          stroke="#EDE4D3" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Serif foot: y=30, x from 4.5 to 13.5 -->
    <line x1="4.5" y1="30" x2="13.5" y2="30"
          stroke="#EDE4D3" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Nuqta: cx=20, cy=34, r=2.4 -->
    <circle cx="20" cy="34" r="2.4" fill="#9B1C1C"/>
  </symbol>

  <!-- ══ SYMBOL 2: primary mark — 120×138 viewBox, S=3× ══ -->
  <symbol id="nadeed-mark-primary" viewBox="0 0 120 138">
    <title>نضيد | NADEED — Primary Mark</title>
    <!-- Outer ring S=3: r=54 -->
    <circle cx="60" cy="60" r="54"
            fill="none" stroke="#EDE4D3" stroke-width="0.7"/>
    <!-- Cardinals S=3: ticks length=9 -->
    <line x1="60" y1="6"   x2="60" y2="15"  stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="114" y1="60" x2="105" y2="60" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="60" y1="114" x2="60" y2="105" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="6"  y1="60"  x2="15" y2="60"  stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Nun arc S=3: r=33, from (27,60) to (93,60) -->
    <path d="M 27,60 A 33,33 0 0,1 93,60"
          fill="none" stroke="#EDE4D3" stroke-width="7.2" stroke-linecap="round"/>
    <!-- Stem S=3: x=27, from y=60 to y=90 -->
    <line x1="27" y1="60" x2="27" y2="90"
          stroke="#EDE4D3" stroke-width="7.2" stroke-linecap="round"/>
    <!-- Serif foot S=3: y=90, x from 13.5 to 40.5 -->
    <line x1="13.5" y1="90" x2="40.5" y2="90"
          stroke="#EDE4D3" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Nuqta S=3: cx=60, cy=102, r=7.2 -->
    <circle cx="60" cy="102" r="7.2" fill="#9B1C1C"/>
    <!-- Wordmark below mark -->
    <text x="60" y="128"
          text-anchor="middle"
          font-family="'Noto Naskh Arabic','Traditional Arabic',serif"
          font-size="24" fill="#EDE4D3" opacity="0.88">نضيد</text>
    <text x="60" y="136"
          text-anchor="middle"
          font-family="Georgia,serif"
          font-size="7" fill="#EDE4D3" letter-spacing="6" opacity="0.35">NADEED</text>
  </symbol>

  <!-- ══ SYMBOL 3: ceremonial / framed — 240×316 viewBox, S=6× ══ -->
  <symbol id="nadeed-mark-ceremonial" viewBox="0 0 240 316">
    <title>نضيد | NADEED — Ceremonial Mark</title>
    <!-- Colophon frame -->
    <rect x="6"   y="6"   width="228" height="304"
          fill="none" stroke="rgba(237,228,211,0.12)" stroke-width="0.5"/>
    <rect x="10"  y="10"  width="220" height="296"
          fill="none" stroke="rgba(237,228,211,0.32)" stroke-width="1.4"/>
    <!-- Corner marks in rouge -->
    <line x1="6"   y1="6"   x2="22"  y2="6"   stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="6"   y1="6"   x2="6"   y2="22"  stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="234" y1="6"   x2="218" y2="6"   stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="234" y1="6"   x2="234" y2="22"  stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="6"   y1="310" x2="22"  y2="310" stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="6"   y1="310" x2="6"   y2="294" stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="234" y1="310" x2="218" y2="310" stroke="#9B1C1C" stroke-width="0.9"/>
    <line x1="234" y1="310" x2="234" y2="294" stroke="#9B1C1C" stroke-width="0.9"/>
    <!-- Outer ring S=6: cx=120, cy=120, r=108 -->
    <circle cx="120" cy="120" r="108"
            fill="none" stroke="rgba(237,228,211,0.18)" stroke-width="0.5"/>
    <circle cx="120" cy="120" r="108"
            fill="none" stroke="rgba(237,228,211,0.3)" stroke-width="1.2"/>
    <!-- Cardinals S=6: ticks length=18 -->
    <line x1="120" y1="12"  x2="120" y2="30"  stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="228" y1="120" x2="210" y2="120" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="120" y1="228" x2="120" y2="210" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="12"  y1="120" x2="30"  y2="120" stroke="#EDE4D3" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <!-- Nun arc S=6: r=66, from (54,120) to (186,120) -->
    <path d="M 54,120 A 66,66 0 0,1 186,120"
          fill="none" stroke="#EDE4D3" stroke-width="14.4" stroke-linecap="round"/>
    <!-- Stem S=6: x=54, from y=120 to y=180 -->
    <line x1="54" y1="120" x2="54" y2="180"
          stroke="#EDE4D3" stroke-width="14.4" stroke-linecap="round"/>
    <!-- Serif foot S=6: y=180, x from 27 to 81 -->
    <line x1="27" y1="180" x2="81" y2="180"
          stroke="#EDE4D3" stroke-width="9" stroke-linecap="round"/>
    <!-- Nuqta S=6: cx=120, cy=204, r=14.4 -->
    <circle cx="120" cy="204" r="14.4" fill="#9B1C1C"/>
    <!-- Divider rule -->
    <line x1="30" y1="234" x2="210" y2="234"
          stroke="rgba(237,228,211,0.15)" stroke-width="0.5"/>
    <!-- Arabic wordmark -->
    <text x="120" y="272"
          text-anchor="middle"
          font-family="'Noto Naskh Arabic','Traditional Arabic',serif"
          font-size="48" fill="rgba(237,228,211,0.88)">نضيد</text>
    <text x="120" y="287"
          text-anchor="middle"
          font-family="Georgia,serif"
          font-size="9" fill="#EDE4D3" letter-spacing="8" opacity="0.3">NADEED</text>
    <!-- Tagline rule -->
    <rect x="80" y="293" width="80" height="1.2" fill="#9B1C1C"/>
    <!-- Tagline -->
    <text x="120" y="308"
          text-anchor="middle"
          font-family="'Noto Naskh Arabic',serif"
          font-size="10" fill="#9B1C1C" letter-spacing="2">لِلْحَرْفِ قَدَر</text>
  </symbol>

</defs>
</svg>

<!--
  ════════════════════════════════════════════════════════════
  USAGE INSTRUCTIONS
  ════════════════════════════════════════════════════════════

  EMBED this file once in the <body> of every page, or load
  it as an external SVG and reference with <use>.

  NAV MARK (28px display):
    <svg width="28" aria-hidden="true" focusable="false">
      <use href="nadeed-logo.svg#nadeed-mark-nav"/>
    </svg>

  PRIMARY MARK (120px display):
    <svg width="120" height="138" aria-label="نضيد | NADEED">
      <use href="nadeed-logo.svg#nadeed-mark-primary"/>
    </svg>

  CEREMONIAL MARK (240px display):
    <svg width="240" height="316" aria-label="نضيد — دار الأدب والفكر والمعرفة">
      <use href="nadeed-logo.svg#nadeed-mark-ceremonial"/>
    </svg>

  ── CRITICAL RULE ─────────────────────────────────────────
  Never draw a logo variant independently.
  All rendering must reference one of the three symbols above.
  Any new size → scale the symbol via width/height attributes only.
  ════════════════════════════════════════════════════════════
-->
